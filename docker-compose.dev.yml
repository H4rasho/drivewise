services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: drivewise
      POSTGRES_USER: drivewise
      POSTGRES_PASSWORD: drivewise_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drivewise"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages/shared:/app/packages/shared
      - api_root_node_modules:/app/node_modules
      - api_pkg_node_modules:/app/apps/api/node_modules
      # Shadows packages/shared/node_modules with the Bun-installed version
      # (symlinks here point into api_root_node_modules/.bun/...)
      - api_shared_node_modules:/app/packages/shared/node_modules
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: drivewise
      POSTGRES_USER: drivewise
      POSTGRES_PASSWORD: drivewise_dev
      NODE_ENV: development
      API_PORT: 3000
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages/shared:/app/packages/shared
      - web_root_node_modules:/app/node_modules
      - web_pkg_node_modules:/app/apps/web/node_modules
      # Shadows packages/shared/node_modules with the Bun-installed version
      - web_shared_node_modules:/app/packages/shared/node_modules
    environment:
      NODE_ENV: development
      API_TARGET: http://api:3000
      HMR_CLIENT_PORT: 5173
    depends_on:
      - api

volumes:
  pgdata_dev:
  api_root_node_modules:
  api_pkg_node_modules:
  api_shared_node_modules:
  web_root_node_modules:
  web_pkg_node_modules:
  web_shared_node_modules:
