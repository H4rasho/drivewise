services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: drivewise
      POSTGRES_USER: drivewise
      POSTGRES_PASSWORD: drivewise_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drivewise"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages/shared:/app/packages/shared
    environment:
      DATABASE_URL: postgres://drivewise:drivewise_dev@db:5432/drivewise
      NODE_ENV: development
      API_PORT: 3000
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages/shared:/app/packages/shared
    environment:
      NODE_ENV: development
      API_TARGET: http://api:3000
      HMR_CLIENT_PORT: 5173
    depends_on:
      - api

volumes:
  pgdata_dev:
